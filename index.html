<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR Gaming AI Ultimate Generator</title>
    <style>
        /* 🌈 আরজিবি অ্যানিমেশন (শুধুমাত্র মেইন সার্চ বক্সের জন্য) */
        @keyframes rgbGradient {
            0% { background-position: 0% 50%; border-color: #00ffcc; }
            50% { background-position: 100% 50%; border-color: #ff0055; }
            100% { background-position: 0% 50%; border-color: #0099ff; }
        }

        @keyframes textRGB {
            0% { color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.6); }
            50% { color: #ff0055; text-shadow: 0 0 10px rgba(255, 0, 85, 0.6); }
            100% { color: #0099ff; text-shadow: 0 0 10px rgba(0, 153, 255, 0.6); }
        }

        body {
            background: linear-gradient(135deg, #030308 0%, #110524 100%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .switch-container {
            margin-bottom: 20px;
            width: 90%;
            max-width: 360px;
        }

        .switch-btn {
            width: 100%;
            background: linear-gradient(45deg, #ff0055, #0099ff);
            color: white;
            border: 2px solid #fff;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
            transition: 0.3s;
            text-transform: uppercase;
        }

        /* মেইন জেনারেটর বক্স */
        .main-box {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 25px 20px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.15);
            margin-bottom: 25px;
            animation: rgbGradient 6s ease infinite; 
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            font-weight: bold;
            animation: textRGB 5s linear infinite;
        }

        input[type="text"] {
            width: 85%;
            padding: 12px;
            border: 2px solid #444;
            border-radius: 10px;
            background: #0d0d13;
            color: #fff;
            font-size: 15px;
            outline: none;
            text-align: center;
            margin-bottom: 10px;
        }

        input[type="text"]:focus {
            border-color: #00ffcc;
        }

        .color-picker-box {
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .color-picker-box label {
            font-size: 13px;
            display: block;
            margin-bottom: 8px;
            color: #00ffcc;
        }

        input[type="color"] {
            width: 60px;
            height: 35px;
            border: none;
            border-radius: 5px;
            background: transparent;
            cursor: pointer;
        }

        .action-btn {
            background: linear-gradient(-45deg, #00ffcc, #ff0055, #0099ff, #7000ff);
            background-size: 300% 300%;
            animation: rgbGradient 4s ease infinite;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 50px;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .container-list {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 🔒 কোড লিস্ট কার্ডের আরজিবি বর্ডার ও নড়াচড়া পুরোপুরি বন্ধ */
        .item-card {
            background: #110c1f;
            border: 1px solid #2d2645;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* ভেতরের কোড টেক্সট বক্স */
        .item-text {
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            word-break: break-all;
            background: #05030a;
            border-radius: 6px;
            padding: 10px;
            border: 1px dashed #444;
            color: #00ffcc;
        }

        /* লাইভ প্রিভিউ বক্স */
        .preview-box {
            background: #080512;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            border: 1px solid #222;
        }

        .preview-title {
            font-size: 11px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .char-count {
            font-size: 11px;
            text-align: right;
            color: #888;
        }

        .copy-btn {
            background: linear-gradient(45deg, #00ffcc, #0099ff);
            color: #000;
            border: none;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .pc-btn {
            background: linear-gradient(45deg, #ff0055, #7000ff);
            color: #fff;
            border: none;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
        }

        .loader {
            display: none;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #ff0055;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="switch-container">
        <button class="switch-btn" id="toggleModeBtn" onclick="switchMode()">🔄 SWITCH TO BIO CODE MODE</button>
    </div>

    <div class="main-box" id="nicknameSection">
        <h2>🤖 MR GAMING AI NICKNAME GENERATOR</h2>
        <input type="text" id="customName" placeholder="ইংরেজিতে গেমিং নিকনেম লিখুন">
        <button class="action-btn" onclick="startNicknameGeneration()">GENERATE NAMES ⚡</button>
    </div>

    <div class="main-box" id="bioSection" style="display: none;">
        <h2>🎨 FF 50-CHAR MAX BIO GENERATOR</h2>
        <input type="text" id="bioInputText" placeholder="আপনার টেক্সট লিখুন (যেমন: KING)">
        
        <div class="color-picker-box">
            <label>⚙️ CUSTOM COLOR PICKER (পছন্দের কালার সিলেক্ট করুন)</label>
            <input type="color" id="customBioColor" value="#00FFCC" onchange="updateCustomColorCode()">
            <div id="hexDisplay" style="font-size: 12px; margin-top: 5px; color: #00ffcc;">কোড: [00FFCC]</div>
        </div>

        <button class="action-btn" onclick="startBioGeneration()">GENERATE BIO CODES 🇧🇩</button>
    </div>

    <div class="loader" id="loadingCircle"></div>
    <div class="container-list" id="outputList"></div>

    <script>
        let currentMode = "nickname";

        const leftSymbols =  ["꧁ ", "亗 ", "〆 ", "ツ ", "彡 ", "× ", "Ø ", "々 ", "ム ", "卍 ", "尺 ", "𐌔 ", "𝔖 ", "ⱴ "];
        const rightSymbols = [" ꧂", " 亗", " 〆", " ツ", " 彡", " ×", " Ø", " 々", " ム", " 卍", " 尺", " 𐌔", " 𝔖", " ⱴ"];
        const myPcLogo = "모ㅤ"; 
        const fontDicts = [
            { 'a': '𝕒', 'b': '𝕓', 'c': '𝕔', 'd': '𝕕', 'e': '𝕖', 'f': '𝕗', 'g': '𝕘', 'h': '𝕙', 'i': '𝕚', 'j': '𝕛', 'k': '𝕜', 'l': '𝕝', 'm': '𝕞', 'n': '𝕟', 'o': '𝕠', 'p': '𝕡', 'q': '𝕢', 'r': '𝕣', 's': '𝕤', 't': '𝕥', 'u': '𝕦', 'v': '𝕧', 'w': '𝕨', 'x': '𝕩', 'y': '𝕪', 'z': '𝕫', 'A': '𝔸', 'B': '𝔹', 'C': 'ℂ', 'D': '𝔻', 'E': '𝔼', 'F': '𝔽', 'G': '𝔾', 'H': 'ℍ', 'I': '𝕀', 'J': '𝕁', 'K': '𝕂', 'L': '𝕃', 'M': '𝕄', 'N': 'ℕ', 'O': '𝕆', 'P': 'ℙ', 'Q': 'ℚ', 'R': 'ℝ', 'S': '𝕊', 'T': '𝕋', 'U': '𝕌', 'V': '𝕍', 'W': '𝕎', 'X': '𝕏', 'Y': '𝕐', 'Z': 'ℤ' },
            { 'a': '𝔞', 'b': '𝔟', 'c': '𝔧', 'd': '𝔡', 'e': '𝔢', 'f': '𝔣', 'g': '𝔤', 'h': '𝔥', 'i': '𝔦', 'j': '𝔧', 'k': '𝔨', 'l': '𝔩', 'm': '𝔪', 'n': '𝔫', 'o': '𝔬', 'p': '𝔭', 'q': '𝔮', 'r': '𝔯', 's': '𝔰', 't': '𝔱', 'u': '𝔲', 'v': '𝔳', 'w': '𝔴', 'x': '𝔵', 'y': '𝔶', 'z': '𝔷', 'A': '𝔄', 'B': '𝔅', 'C': '𝔆', 'D': '𝔇', 'E': '𝔈', 'F': '𝔉', 'G': '𝔊', 'H': '𝔥', 'I': '𝔉', 'J': '𝔍', 'K': '𝔎', 'L': '𝔏', 'M': '𝔐', 'N': '𝔑', 'O': '𝔒', 'P': '𝔓', 'Q': '𝔔', 'R': '𝔖', 'S': '𝔖', 'T': '𝔗', 'U': '𝔘', 'V': '𝔙', 'W': '𝔚', 'X': '𝔛', 'Y': '𝔜', 'Z': '𝔝' },
            { 'a': 'ᴀ', 'b': 'ʙ', 'c': '🇨', 'd': 'ᴅ', 'e': 'ᴇ', 'f': 'ꜰ', 'g': 'ɢ', 'h': 'ʜ', 'i': 'ɪ', 'j': 'ᴊ', 'k': 'ᴋ', 'l': 'ʟ', 'm': 'ᴍ', 'n': 'ɴ', 'o': 'ᴏ', 'p': 'ᴘ', 'q': 'ǫ', 'r': 'ʀ', 's': 's', 't': 'ᴛ', 'u': 'ᴜ', 'v': 'ᴠ', 'w': 'ᴡ', 'x': 'x', 'y': 'ʏ', 'z': 'ᴢ', 'A': 'ᴀ', 'B': 'ʙ', 'C': '🇨', 'D': 'ᴅ', 'E': 'ᴇ', 'F': 'ꜰ', 'G': 'ɢ', 'H': 'ʜ', 'I': 'ɪ', 'J': 'ᴊ', 'K': 'ᴋ', 'L': 'ʟ', 'M': 'ᴍ', 'N': 'ɴ', 'O': 'ᴏ', 'P': 'ᴘ', 'Q': 'ǫ', 'R': 'ʀ', 'S': 's', 'T': 'ᴛ', 'U': 'ᴜ', 'V': 'ᴠ', 'W': 'ᴡ', 'X': 'x', 'Y': 'ʏ', 'Z': 'ᴢ' }
        ];

        function switchMode() {
            document.getElementById("outputList").innerHTML = "";
            if (currentMode === "nickname") {
                currentMode = "bio";
                document.getElementById("nicknameSection").style.display = "none";
                document.getElementById("bioSection").style.display = "block";
                document.getElementById("toggleModeBtn").innerText = "🔄 SWITCH TO NICKNAME MODE";
                document.getElementById("toggleModeBtn").style.background = "linear-gradient(45deg, #0099ff, #00ffcc)";
            } else {
                currentMode = "nickname";
                document.getElementById("nicknameSection").style.display = "block";
                document.getElementById("bioSection").style.display = "none";
                document.getElementById("toggleModeBtn").innerText = "🔄 SWITCH TO BIO CODE MODE";
                document.getElementById("toggleModeBtn").style.background = "linear-gradient(45deg, #ff0055, #0099ff)";
            }
        }

        function updateCustomColorCode() {
            let color = document.getElementById("customBioColor").value.toUpperCase();
            document.getElementById("hexDisplay").innerText = "কোড: [" + color.substring(1) + "]";
        }

        function convertToPerfectFont(text, styleIndex) {
            var dict = fontDicts[styleIndex] || fontDicts[0];
            var result = "";
            for (var i = 0; i < text.length; i++) { var char = text[i]; result += dict[char] || char; }
            return result;
        }

        function startNicknameGeneration() {
            var inputName = document.getElementById("customName").value.trim();
            if(inputName === "") { alert("মুসা ভাই, আগে আপনার নাম লিখুন!"); return; }
            
            showLoader();
            setTimeout(function() {
                hideLoader();
                var htmlContent = "";
                for (var i = 0; i < leftSymbols.length; i++) {
                    for (var j = 0; j < fontDicts.length; j++) {
                        var finalName = leftSymbols[i] + convertToPerfectFont(inputName, j) + rightSymbols[i];
                        var nameWithPc = finalName + " " + myPcLogo;

                        htmlContent += '<div class="item-card">' +
                                            '<div class="item-text" style="border:none; background:transparent; font-size:18px; color:#fff; word-break:normal;">' + finalName + '</div>' +
                                            '<div class="btn-group">' +
                                                '<button class="pc-btn" style="background:linear-gradient(45deg, #00ffcc, #0099ff); color:#000;" onclick="copyText(\'' + finalName + '\', \'শুধু নাম কপি হয়েছে!\')">📋 COPY</button>' +
                                                '<button class="pc-btn" onclick="copyText(\'' + nameWithPc + '\', \'নাম + PC লোগো কপি হয়েছে!\')">🖥️ +PC LOGO</button>' +
                                            '</div>' +
                                       '</div>';
                    }
                }
                document.getElementById("outputList").innerHTML = htmlContent;
            }, 400);
        }

        function makeSafeBio(fullCode, allowedMax = 50) {
            if (fullCode.length <= allowedMax) return fullCode;
            return fullCode.substring(0, allowedMax);
        }

        function startBioGeneration() {
            var text = document.getElementById("bioInputText").value.trim();
            if(text === "") { text = "MR GAMING"; }

            let customHex = document.getElementById("customBioColor").value.toUpperCase().substring(1);
            let customColorCode = "[b][c][" + customHex + "]";

            var htmlContent = "";
            showLoader();
            
            setTimeout(function() {
                hideLoader();

                // ১. বাংলাদেশ ফ্ল্যাগ
                let bdCode = makeSafeBio("[b][c][006A4E]█[FF0000]⬤[006A4E]█ [FFFFFF]" + text);
                htmlContent += '<div class="item-card">' +
                                    '<div style="font-size:12px; color:#00ffcc; font-weight:bold; text-align:center;">🇧🇩 BANGLADESH FLAG STYLE</div>' +
                                    '<div class="item-text">' + bdCode + '</div>' +
                                    '<div class="char-count">কোড লেন্থ: ' + bdCode.length + '/50</div>' +
                                    '<div class="preview-box">' +
                                        '<div class="preview-title">গেমের ভেতরের লাইভ লুক</div>' +
                                        '<span style="color:#006A4E">█</span><span style="color:#FF0000; font-size:15px;">●</span><span style="color:#006A4E">█</span> <span style="color:#fff">' + text + '</span>' +
                                    '</div>' +
                                    '<button class="copy-btn" onclick="copyText(\'' + bdCode + '\', \'বাংলাদেশ ফ্ল্যাগ কোড কপি হয়েছে!\')">📋 COPY CODE</button>' +
                               '</div>';

                // ২. কাস্টম কালার
                let customBio = makeSafeBio(customColorCode + "❖ " + text + " ❖");
                htmlContent += '<div class="item-card">' +
                                    '<div style="font-size:12px; color:#ff0055; font-weight:bold; text-align:center;">🎨 YOUR CUSTOM COLOR BIO</div>' +
                                    '<div class="item-text">' + customBio + '</div>' +
                                    '<div class="char-count">কোড লেন্থ: ' + customBio.length + '/50</div>' +
                                    '<div class="preview-box">' +
                                        '<div class="preview-title">গেমের ভেতরের লাইভ লুক</div>' +
                                        '<span style="color:#'+customHex+'">❖ ' + text + ' ❖</span>' +
                                    '</div>' +
                                    '<button class="copy-btn" onclick="copyText(\'' + customBio + '\', \'কাস্টম কালার কোড কপি হয়েছে!\')">📋 COPY CODE</button>' +
                               '</div>';

                // ৩. ফিক্সড ১০টি ওপি স্টাইল লিস্ট
                const styles = [
                    { l: "[b][c][00FFCC]◢ ", r: " ◣", lbl: "সাইড ট্রায়াঙ্গেল", prv: (t) => `<span style="color:#00FFCC">◢ ${t} ◣</span>` },
                    { l: "[b][c][00F5FF]▶ ", r: " ◀", lbl: "প্লে বাটন স্টাইল", prv: (t) => `<span style="color:#00F5FF">▶ ${t} ◀</span>` },
                    { l: "[b][c][FF0055]⚡ ", r: " ⚡", lbl: "লাইটেনিং থিম", prv: (t) => `<span style="color:#ff0055">⚡</span> <span style="color:#fff">${t}</span> <span style="color:#ff0055">⚡</span>` },
                    { l: "[b][c][7000FF]✖ ", r: " ✖", lbl: "ক্রস এটিটিউড", prv: (t) => `<span style="color:#7000FF">✖ ${t} ✖</span>` },
                    { l: "[b][c][FFD700]⚔️ ", r: " ⚔️", lbl: "ক্রস সোর্ড ওয়ারিয়র", prv: (t) => `<span style="color:#FFD700">⚔️ ${t} ⚔️</span>` },
                    { l: "[b][c][00FF00]█ ", r: " █", lbl: "সলিড ব্লক স্টাইল", prv: (t) => `<span style="color:#00FF00">█ ${t} █</span>` },
                    { l: "[b][c][FF3300]🔥 ", r: " 🔥", lbl: "ফায়ার ভাইব", prv: (t) => `<span style="color:#FF3300">🔥 ${t} 🔥</span>` },
                    { l: "[b][c][FF0055]『", r: "』", lbl: "ব্র্যাকেট বক্স", prv: (t) => `<span style="color:#FF0055">『${t}』</span>` },
                    { l: "[b][c][00FFFF]★ ", r: " ★", lbl: "স্টার কিং", prv: (t) => `<span style="color:#00FFFF">★ ${t} ★</span>` },
                    { l: "[b][c][FF00FF]☠️ ", r: " ☠️", lbl: "ডেঞ্জার স্কাল", prv: (t) => `<span style="color:#FF00FF">☠️ ${t} ☠️</span>` }
                ];

                for (let i = 0; i < styles.length; i++) {
                    let st = styles[i];
                    let finalCode = makeSafeBio(st.l + text + st.r);
                    htmlContent += '<div class="item-card">' +
                                        '<div style="font-size:12px; color:#aaa; font-weight:bold; text-align:center;">🔥 STYLE ' + (i+1) + ': ' + st.lbl + '</div>' +
                                        '<div class="item-text">' + finalCode + '</div>' +
                                        '<div class="char-count">কোড লেন্থ: ' + finalCode.length + '/50</div>' +
                                        '<div class="preview-box">' +
                                            '<div class="preview-title">গেমের ভেতরের লাইভ লুক</div>' +
                                            st.prv(text) +
                                        '</div>' +
                                        '<button class="copy-btn" onclick="copyText(\'' + finalCode + '\', \'কোড কপি হয়েছে!\')">📋 COPY CODE</button>' +
                                   '</div>';
                }

                document.getElementById("outputList").innerHTML = htmlContent;
            }, 400);
        }

        function showLoader() { document.getElementById("loadingCircle").style.display = "block"; }
        function hideLoader() { document.getElementById("loadingCircle").style.display = "none"; }

        function copyText(text, message) {
            navigator.clipboard.writeText(text).then(function() {
                alert(message + "\n👉 " + text);
            }).catch(function() {
                var textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                alert(message + "\n👉 " + text);
            });
        }
    </script>
</body>
    </html>
